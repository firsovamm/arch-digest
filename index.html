<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Архитектурный дайджест</title>
<style>
:root{color-scheme:light}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;background:#fafaf7;color:#1a1a1a;line-height:1.5}.wrap{max-width:1100px;margin:0 auto;padding:28px 24px 60px}header{border-bottom:1px solid #e6e3dc;padding-bottom:20px;margin-bottom:20px}.title-row{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap}h1{margin:0;font-size:28px;font-weight:700;letter-spacing:-.02em;font-family:Georgia,"Times New Roman",serif}.updated{font-size:13px;color:#6b6b66}.lede{margin-top:6px;font-size:14px;color:#4a4a44;max-width:720px}.filters{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}.filter-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}.filter-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-right:8px;min-width:80px}.chip{display:inline-block;padding:6px 12px;border-radius:999px;border:1px solid #d8d4ca;background:#fff;color:#333;font-size:13px;cursor:pointer;user-select:none;transition:all .15s}.chip:hover{border-color:#888}.chip.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}.card{background:#fff;border:1px solid #e6e3dc;border-radius:8px;padding:18px;display:flex;flex-direction:column;gap:8px;transition:border-color .15s}.card:hover{border-color:#1a1a1a}.meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#6b6b66}.source{font-weight:600;color:#444}.topics{display:flex;gap:4px;flex-wrap:wrap}.topic-tag{font-size:11px;padding:2px 8px;border-radius:4px;background:#f1ede4;color:#5a5246}.card h3{margin:0;font-size:17px;line-height:1.3;font-family:Georgia,"Times New Roman",serif;font-weight:600}.card h3 a{color:inherit;text-decoration:none}.card h3 a:hover{text-decoration:underline}.summary{font-size:14px;color:#3a3a33;margin:0}.empty{text-align:center;padding:40px;color:#888;font-style:italic}footer{margin-top:40px;padding-top:20px;border-top:1px solid #e6e3dc;font-size:12px;color:#888}.count{font-size:13px;color:#6b6b66;margin-bottom:12px}
</style>
</head>
<body>
<div class="wrap">
<header><div class="title-row"><h1>Архитектурный дайджест</h1><div class="updated">Обновлено: 6 июня 2026</div></div><p class="lede">Подборка свежих новостей мировой и российской архитектуры. Обновляется автоматически дважды в неделю.</p></header>
<div class="filters"><div class="filter-row" id="topic-filters"><span class="filter-label">Тема</span></div><div class="filter-row" id="region-filters"><span class="filter-label">Регион</span></div></div>
<div class="count" id="count"></div><div class="grid" id="grid"></div>
<footer>Источники: Dezeen, ArchDaily, Архи.ру, BauNetz, Wallpaper*, Architectural Record и др.</footer>
</div>
<script>
const NEWS = [

{title:"Safdie Architects открыли расширение Crystal Bridges Museum",source:"ArchDaily",sourceUrl:"https://www.archdaily.com/",date:"2026-06-06",topics:["buildings"],region:"international",summary:"В Бентонвилле (Арканзас) открылась пристройка площадью 114 000 кв. футов: новые галереи, образовательные пространства и ландшафтные связи.",url:"https://www.archdaily.com/architecture-news"},
{title:"Bread & Heart Festival собрался в Тиране",source:"ArchDaily",sourceUrl:"https://www.archdaily.com/",date:"2026-06-05",topics:["people","urbanism"],region:"europe",summary:"Второй сезон фестиваля 3–5 июня, со-курируемый кафедрой архитектуры и городской трансформации ETH Zürich, исследовал темы общественного хлеба и общего пространства.",url:"https://www.archdaily.com/architecture-news"},
{title:"Венецианская биеннале открыла архивный центр в Арсенале",source:"Dezeen",sourceUrl:"https://www.dezeen.com/",date:"2026-06-04",topics:["buildings"],region:"europe",summary:"Штаб-квартира исторических архивов всех программ биеннале разместилась на новой площадке Арсенала и стала ресурсом для исследователей.",url:"https://www.dezeen.com/architecture/"},
{title:"Объявлены участники первого Панафриканского биеннале в Найроби",source:"ArchDaily",sourceUrl:"https://www.archdaily.com/",date:"2026-06-03",topics:["awards"],region:"international",summary:"Инаугурационная биеннале представит исследовательские и культурные проекты, посвящённые архитектуре континента.",url:"https://www.archdaily.com/architecture-news"},
{title:"Concéntrico Festival переосмыслил общественные пространства Логроньо",source:"Dezeen",sourceUrl:"https://www.dezeen.com/",date:"2026-06-02",topics:["urbanism"],region:"europe",summary:"Серия временных инсталляций по всему историческому центру города предложила новый взгляд на дворы, переулки и площади.",url:"https://www.dezeen.com/architecture/"},
{title:"Климатическая устойчивость стала обязательным требованием планирования",source:"Planetizen",sourceUrl:"https://www.planetizen.com/",date:"2026-06-01",topics:["engineering","urbanism"],region:"international",summary:"Экстремальные погодные явления перестраивают приоритеты городов: устойчивость к климату вышла из категории целей в категорию базовых требований.",url:"https://www.planetizen.com/news"},
{title:"АРХ Москва 2026 завершилась в Гостином Дворе",source:"Архи.ру",sourceUrl:"https://archi.ru/",date:"2026-05-30",topics:["awards","people"],region:"russia",summary:"31-я выставка прошла под темой «поиск идеала», объединив утопистов и реалистов вокруг разговора о современном городе.",url:"https://archi.ru/"},
{title:"RSHP завершили мастер-план Barangaroo South в Сиднее",source:"ArchDaily",sourceUrl:"https://www.archdaily.com/",date:"2026-05-30",topics:["urbanism","buildings"],region:"international",summary:"15-летний редевелопмент северо-западной части гавани воссоединил центр Сиднея с водой и завершил один из крупнейших австралийских проектов десятилетия.",url:"https://www.archdaily.com/tag/masterplan"},
{title:"Мичиганский университет запустил магистратуру по городским технологиям",source:"Planetizen",sourceUrl:"https://www.planetizen.com/",date:"2026-05-30",topics:["people","engineering"],region:"international",summary:"Новая программа объединяет инженерию, данные и градостроительство для подготовки специалистов по инфраструктуре следующего поколения.",url:"https://www.planetizen.com/news/2026/04/137332-university-michigan-launches-urban-technology-masters-program"},
{title:"На «Арх Москве» обсудили рецепт идеального градостроительного проекта",source:"Строительная газета",sourceUrl:"https://stroygaz.ru/",date:"2026-05-29",topics:["urbanism"],region:"russia",summary:"Эксперты сформулировали критерии успешного мастер-плана — от баланса плотности и функционального микса до общественной программы и сценариев участия жителей.",url:"https://stroygaz.ru/news/architecture/na-arkh-moskve-obsudili-retsept-idealnogo-gradostroitelnogo-proekta/"},
{title:"Секция NEXT собрала молодые российские бюро на АРХ Москве",source:"Архсовет Москвы",sourceUrl:"https://archsovet.msk.ru/",date:"2026-05-28",topics:["people"],region:"russia",summary:"Спецсекция для бюро не старше десяти лет показала, как вчерашние дебюты становятся профессиональным мейнстримом.",url:"https://archsovet.msk.ru/"},
{title:"Нью-Йорку нужен новый комплексный план города — статья Common Edge",source:"Common Edge",sourceUrl:"https://commonedge.org/",date:"2026-05-28",topics:["urbanism"],region:"international",summary:"Авторы предлагают вернуться к идее единого comprehensive plan — впервые с середины XX века.",url:"https://commonedge.org/its-2026-time-for-a-comprehensive-plan-for-new-york-city/"},
{title:"Смилян Радич Кларке — лауреат Притцкеровской премии 2026",source:"Wallpaper*",sourceUrl:"https://www.wallpaper.com/",date:"2026-05-27",topics:["awards","people"],region:"international",summary:"Чилийский архитектор стал 55-м лауреатом. Жюри отметило работы «на перекрёстке неопределённости, материальных экспериментов и культурной памяти».",url:"https://www.wallpaper.com/architecture/smiljan-radic-clarke-2026-pritzker-architecture-prize"},
{title:"Snøhetta победила в конкурсе на редевелопмент Skamarken в Драммене",source:"ArchDaily",sourceUrl:"https://www.archdaily.com/",date:"2026-05-26",topics:["urbanism"],region:"europe",summary:"Норвежское бюро предложило речной ландшафт с островами, мягкими берегами и общественными пространствами на бывшем железнодорожном участке.",url:"https://www.archdaily.com/tag/masterplan"},
{title:"Объявление Притцкера задержано из-за скандала с письмами Эпштейна",source:"The Architect's Newspaper",sourceUrl:"https://www.archpaper.com/",date:"2026-05-25",topics:["awards","people"],region:"international",summary:"Том Притцкер, вице-президент Pritzker Foundation, упомянут более тысячи раз в материалах Минюста США — объявление лауреата перенесено с марта.",url:"https://www.archpaper.com/2026/02/pritzker-epstein/"}
];
const TOPICS=[{id:"all",label:"Все темы"},{id:"buildings",label:"Здания и проекты"},{id:"urbanism",label:"Урбанистика"},{id:"awards",label:"Премии и события"},{id:"people",label:"Персоны и интервью"},{id:"engineering",label:"Инженерные решения"}];
const REGIONS=[{id:"all",label:"Все регионы"},{id:"international",label:"Международные"},{id:"russia",label:"Россия"},{id:"europe",label:"Европа"}];
const state={topic:"all",region:"all"};
function fmtDate(iso){const m=["янв","фев","мар","апр","мая","июн","июл","авг","сен","окт","ноя","дек"];const d=new Date(iso);return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`}
function topicLabel(id){const t=TOPICS.find(x=>x.id===id);return t?t.label:id}
function renderFilters(){const tR=document.getElementById("topic-filters"),rR=document.getElementById("region-filters");TOPICS.forEach(t=>{const c=document.createElement("span");c.className="chip"+(state.topic===t.id?" active":"");c.textContent=t.label;c.onclick=()=>{state.topic=t.id;render()};tR.appendChild(c)});REGIONS.forEach(r=>{const c=document.createElement("span");c.className="chip"+(state.region===r.id?" active":"");c.textContent=r.label;c.onclick=()=>{state.region=r.id;render()};rR.appendChild(c)})}
function render(){document.querySelectorAll("#topic-filters .chip").forEach((c,i)=>c.classList.toggle("active",TOPICS[i].id===state.topic));document.querySelectorAll("#region-filters .chip").forEach((c,i)=>c.classList.toggle("active",REGIONS[i].id===state.region));const f=NEWS.filter(n=>(state.topic==="all"||n.topics.includes(state.topic))&&(state.region==="all"||n.region===state.region)).sort((a,b)=>b.date.localeCompare(a.date));const g=document.getElementById("grid");document.getElementById("count").textContent=`Показано: ${f.length} из ${NEWS.length}`;g.innerHTML="";if(!f.length){const e=document.createElement("div");e.className="empty";e.textContent="Нет новостей.";g.appendChild(e);return}f.forEach(n=>{const c=document.createElement("article");c.className="card";const th=n.topics.map(t=>`<span class="topic-tag">${topicLabel(t)}</span>`).join("");c.innerHTML=`<div class="meta"><span class="source"><a href="${n.sourceUrl}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">${n.source}</a></span><span>${fmtDate(n.date)}</span></div><h3><a href="${n.url}" target="_blank" rel="noopener">${n.title}</a></h3><p class="summary">${n.summary}</p><div class="topics">${th}</div>`;g.appendChild(c)})}
renderFilters();render();
</script>
</body>
</html>
