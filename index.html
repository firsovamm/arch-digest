<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Архитектурный дайджест</title>
<style>
:root{color-scheme:light}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;background:#fafaf7;color:#1a1a1a;line-height:1.5}.wrap{max-width:1100px;margin:0 auto;padding:28px 24px 60px}header{border-bottom:1px solid #e6e3dc;padding-bottom:20px;margin-bottom:20px}.title-row{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap}h1{margin:0;font-size:28px;font-weight:700;letter-spacing:-.02em;font-family:Georgia,"Times New Roman",serif}.updated{font-size:13px;color:#6b6b66}.lede{margin-top:6px;font-size:14px;color:#4a4a44;max-width:720px}.filters{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}.filter-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}.filter-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-right:8px;min-width:80px}.chip{display:inline-block;padding:6px 12px;border-radius:999px;border:1px solid #d8d4ca;background:#fff;color:#333;font-size:13px;cursor:pointer;user-select:none;transition:all .15s}.chip:hover{border-color:#888}.chip.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}.card{background:#fff;border:1px solid #e6e3dc;border-radius:8px;padding:18px;display:flex;flex-direction:column;gap:8px;transition:border-color .15s}.card:hover{border-color:#1a1a1a}.meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#6b6b66}.source{font-weight:600;color:#444}.topics{display:flex;gap:4px;flex-wrap:wrap}.topic-tag{font-size:11px;padding:2px 8px;border-radius:4px;background:#f1ede4;color:#5a5246}.card h3{margin:0;font-size:17px;line-height:1.3;font-family:Georgia,"Times New Roman",serif;font-weight:600}.card h3 a{color:inherit;text-decoration:none}.card h3 a:hover{text-decoration:underline}.summary{font-size:14px;color:#3a3a33;margin:0}.empty{text-align:center;padding:40px;color:#888;font-style:italic}footer{margin-top:40px;padding-top:20px;border-top:1px solid #e6e3dc;font-size:12px;color:#888}.count{font-size:13px;color:#6b6b66;margin-bottom:12px}
</style>
</head>
<body>
<div class="wrap">
<header><div class="title-row"><h1>Архитектурный дайджест</h1><div class="updated">Обновлено: 8 июня 2026</div></div><p class="lede">Подборка свежих новостей мировой и российской архитектуры. Обновляется автоматически дважды в неделю.</p></header>
<div class="filters"><div class="filter-row" id="topic-filters"><span class="filter-label">Тема</span></div><div class="filter-row" id="region-filters"><span class="filter-label">Регион</span></div></div>
<div class="count" id="count"></div><div class="grid" id="grid"></div>
<footer>Источники: Dezeen, ArchDaily, Архи.ру, BauNetz, Wallpaper*, Architectural Record и др.</footer>
</div>
<script>
const NEWS = [
  {title:"Серпентайн Павильон 2026: LANZA atelier создали «Серпентину» в Лондоне",source:"Dezeen",sourceUrl:"https://www.dezeen.com",date:"2026-06-06",topics:["buildings"],region:"international",summary:"6 июня в лондонском Гайд-парке открылся 25-й павильон Серпентайн, спроектированный мексиканским бюро LANZA atelier. Юбилейная конструкция «a serpentine» отмечает 25-летие программы, стартовавшей в 2000 году с проекта Захи Хадид.",url:"https://www.dezeen.com/architecture/"},
  {title:"Завершено строительство Президентского центра Обамы в Чикаго",source:"ArchDaily",sourceUrl:"https://www.archdaily.com",date:"2026-06-03",topics:["buildings","people"],region:"international",summary:"Бюро Tod Williams Billie Tsien Architects завершило монументальный гранитный комплекс с искусственными холмами в честь 44-го президента США. Центр стал масштабным культурным хабом на южной стороне Чикаго.",url:"https://www.archdaily.com/architecture-news"},
  {title:"Лауреат Притцкеровской премии 2026 — чилиец Смильян Радич Кларк",source:"Pritzker Architecture Prize",sourceUrl:"https://www.pritzkerprize.com/media-news",date:"2026-03-12",topics:["awards","people"],region:"international",summary:"12 марта объявлен лауреат главной архитектурной премии — им стал Смильян Радич Кларк из Сантьяго, второй чилиец после Алехандро Аравены (2016). Объявление задержалось из-за скандала вокруг семьи Притцкеров.",url:"https://www.pritzkerprize.com/media-news"},
  {title:"Финалисты премии Миса ван дер Роэ 2026 — семь проектов будущего Европы",source:"Mies van der Rohe Award",sourceUrl:"https://www.miesarch.com",date:"2026-05-15",topics:["awards"],region:"europe",summary:"Европейская комиссия и Фонд Миса ван дер Роэ объявили семь финалистов премии 2026 года: пять в категории «Архитектура» и два — «Emerging». Жюри возглавил новоиспечённый лауреат Притцкера Смильян Радич.",url:"https://www.miesarch.com"},
  {title:"London Festival of Architecture 2026: месяц под темой Belonging",source:"Dezeen",sourceUrl:"https://www.dezeen.com",date:"2026-06-01",topics:["urbanism","awards"],region:"europe",summary:"Июнь в Лондоне проходит под знаком Фестиваля архитектуры с темой «Принадлежность». Активации охватывают 11 районов города — публичные инсталляции, дискуссии и открытые дни в архитектурных бюро.",url:"https://www.dezeen.com/2026/06/01/eight-architecture-design-events-june-dezeen-events-guide-2026/"},
  {title:"Concéntrico 2026: урбанистические интервенции превратят Логроньо в лабораторию",source:"Dezeen",sourceUrl:"https://www.dezeen.com",date:"2026-06-01",topics:["urbanism"],region:"europe",summary:"С 18 по 23 июня испанский Логроньо примет фестиваль Concéntrico — более 20 архитектурных интервенций на площадях, пустырях, мостах и улицах города.",url:"https://www.dezeen.com/2026/06/01/eight-architecture-design-events-june-dezeen-events-guide-2026/"},
  {title:"Мастерплан Barangaroo South в Сиднее: порт стал безуглеродным кварталом",source:"ArchDaily",sourceUrl:"https://www.archdaily.com",date:"2026-05-28",topics:["urbanism","buildings"],region:"international",summary:"Реализован мастерплан 22-гектарного бывшего контейнерного порта в Сиднее. Квартал Barangaroo South объединил офисы, жильё и публичные набережные, получив статус углеродно-нейтральной территории.",url:"https://www.archdaily.com/tag/masterplan"},
  {title:"Hunnu City: мастерплан нового монгольского города до 2050 года",source:"ArchDaily",sourceUrl:"https://www.archdaily.com",date:"2026-05-30",topics:["urbanism"],region:"international",summary:"Победивший мастерплан Hunnu City ориентирован на цели развития Монголии до 2050 года — устойчивость, умные технологии и децентрализованный рост. Один из крупнейших градостроительных заказов года.",url:"https://www.archdaily.com/1037399/from-housing-policy-in-europe-to-large-scale-master-planning-in-mongolia-this-weeks-review"},
  {title:"Нью-Йорк в 2026 году ждёт исторически первого генерального плана",source:"Common Edge",sourceUrl:"https://commonedge.org",date:"2026-06-02",topics:["urbanism"],region:"international",summary:"Авторитетное издание Common Edge призвало Нью-Йорк принять первый в истории города комплексный генеральный план. Жилищный кризис и климатические риски делают долгосрочное планирование мегаполиса неотложным.",url:"https://commonedge.org/its-2026-time-for-a-comprehensive-plan-for-new-york-city/"},
  {title:"NS Square в Сингапуре: эталон климатически адаптивного публичного пространства",source:"ArchDaily",sourceUrl:"https://www.archdaily.com",date:"2026-05-25",topics:["urbanism","engineering"],region:"international",summary:"Площадь NS Square стала эталоном устойчивой городской среды: вертикальные леса, пассивное охлаждение фасадов, городские фермы и принципы циркулярной экономики — в одном общественном пространстве.",url:"https://www.archdaily.com/architecture-news"},
  {title:"Depot Boijmans в Роттердаме: инженерный манифест в форме зеркальной чаши",source:"Dezeen",sourceUrl:"https://www.dezeen.com",date:"2026-05-27",topics:["buildings","engineering"],region:"europe",summary:"Depot Boijmans Van Beuningen продолжает переосмыслять тип музейного здания: открытое хранилище с зеркальной куполообразной поверхностью полностью доступно для посетителей — редчайший прецедент в музейной практике.",url:"https://www.dezeen.com/architecture/"},
  {title:"Европейская жара 2026: архитекторы ищут ответы на климатический вызов",source:"Dezeen",sourceUrl:"https://www.dezeen.com",date:"2026-06-03",topics:["engineering","urbanism"],region:"europe",summary:"Одна из самых ранних волн тепла охватила Португалию, Францию, Испанию, Италию, Германию и Великобританию. Архитектурное сообщество обсуждает адаптацию городской среды к новой климатической норме.",url:"https://www.dezeen.com/news/"},
  {title:"АРХ Москва 2026: «В поисках идеала» — 31-я выставка прошла в Гостином Дворе",source:"АРХ Москва",sourceUrl:"https://www.archmoscow.ru/",date:"2026-05-27",topics:["awards","urbanism"],region:"russia",summary:"С 27 по 30 мая в Гостином Дворе прошла 31-я международная выставка АРХ Москва с темой «поиски идеала». Более 27 тысяч посетителей — архитекторов, девелоперов и урбанистов — обсудили будущее российских городов.",url:"https://www.archmoscow.ru/"},
  {title:"На АРХ Москве обсудили рецепт идеального градостроительного проекта",source:"Строительная газета",sourceUrl:"https://stroygaz.ru",date:"2026-05-30",topics:["urbanism","people"],region:"russia",summary:"На деловой программе выставки архитекторы, чиновники и девелоперы искали общую формулу качественного городского проекта. Дискуссии выявили противоречие между коммерческой эффективностью и градостроительными ценностями.",url:"https://stroygaz.ru/news/architecture/na-arkh-moskve-obsudili-retsept-idealnogo-gradostroitelnogo-proekta/"},
  {title:"NEXT на АРХ Москве: программа поддержки молодых бюро привлекла рекордное число участников",source:"Архи.ру",sourceUrl:"https://archi.ru/",date:"2026-05-28",topics:["people","awards"],region:"russia",summary:"Специальный раздел NEXT для бюро не старше десяти лет стал площадкой для дебюта нового поколения российских архитекторов — от реновации жилья до концепций смешанных общественных пространств.",url:"https://archi.ru/"},
  {title:"San Francisco Design Week отмечает 20-летие под темой Multitudes",source:"Dezeen",sourceUrl:"https://www.dezeen.com",date:"2026-06-01",topics:["awards","people"],region:"international",summary:"Двадцатый юбилейный San Francisco Design Week прошёл под темой Multitudes («Множественность»), отмечая силу разнообразия в дизайне. Сотни событий объединили дизайнеров, архитекторов и технологические компании Залива.",url:"https://www.dezeen.com/2026/06/01/eight-architecture-design-events-june-dezeen-events-guide-2026/"},
  {title:"Университет Мичигана открывает магистратуру по городским технологиям",source:"Planetizen",sourceUrl:"https://www.planetizen.com",date:"2026-04-15",topics:["people","urbanism"],region:"international",summary:"Новая магистерская программа по urban technology готовит специалистов на стыке градостроительства, данных и ИИ — в ответ на растущий спрос городов на экспертов с цифровыми инструментами планирования.",url:"https://www.planetizen.com/news/2026/04/137332-university-michigan-launches-urban-technology-masters-program"}
];
const TOPICS=[{id:"all",label:"Все темы"},{id:"buildings",label:"Здания и проекты"},{id:"urbanism",label:"Урбанистика"},{id:"awards",label:"Премии и события"},{id:"people",label:"Персоны и интервью"},{id:"engineering",label:"Инженерные решения"}];
const REGIONS=[{id:"all",label:"Все регионы"},{id:"international",label:"Международные"},{id:"russia",label:"Россия"},{id:"europe",label:"Европа"}];
const state={topic:"all",region:"all"};
function fmtDate(iso){const m=["янв","фев","мар","апр","мая","июн","июл","авг","сен","окт","ноя","дек"];const d=new Date(iso);return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`}
function topicLabel(id){const t=TOPICS.find(x=>x.id===id);return t?t.label:id}
function renderFilters(){const tR=document.getElementById("topic-filters"),rR=document.getElementById("region-filters");TOPICS.forEach(t=>{const c=document.createElement("span");c.className="chip"+(state.topic===t.id?" active":"");c.textContent=t.label;c.onclick=()=>{state.topic=t.id;render()};tR.appendChild(c)});REGIONS.forEach(r=>{const c=document.createElement("span");c.className="chip"+(state.region===r.id?" active":"");c.textContent=r.label;c.onclick=()=>{state.region=r.id;render()};rR.appendChild(c)})}
function render(){document.querySelectorAll("#topic-filters .chip").forEach((c,i)=>c.classList.toggle("active",TOPICS[i].id===state.topic));document.querySelectorAll("#region-filters .chip").forEach((c,i)=>c.classList.toggle("active",REGIONS[i].id===state.region));const f=NEWS.filter(n=>(state.topic==="all"||n.topics.includes(state.topic))&&(state.region==="all"||n.region===state.region)).sort((a,b)=>b.date.localeCompare(a.date));const g=document.getElementById("grid");document.getElementById("count").textContent=`Показано: ${f.length} из ${NEWS.length}`;g.innerHTML="";if(!f.length){const e=document.createElement("div");e.className="empty";e.textContent="Нет новостей.";g.appendChild(e);return}f.forEach(n=>{const c=document.createElement("article");c.className="card";const th=n.topics.map(t=>`<span class="topic-tag">${topicLabel(t)}</span>`).join("");c.innerHTML=`<div class="meta"><span class="source"><a href="${n.sourceUrl}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">${n.source}</a></span><span>${fmtDate(n.date)}</span></div><h3><a href="${n.url}" target="_blank" rel="noopener">${n.title}</a></h3><p class="summary">${n.summary}</p><div class="topics">${th}</div>`;g.appendChild(c)})}
renderFilters();render();
</script>
</body>
</html>
